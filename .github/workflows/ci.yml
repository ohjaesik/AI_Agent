name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/axplanner_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: axplanner_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      OPENAI_API_KEY: test-key
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIM: 1536
      VLLM_BASE_URL: http://localhost:8000/v1
      VLLM_API_KEY: EMPTY
      VLLM_MODEL: google/gemma-2-9b-it
      APP_API_KEY: test-api-key
      APP_JWT_SECRET: test-jwt-secret-at-least-32-bytes-long
      APP_ENV: ci
      STORAGE_BACKEND: local
      LOCAL_STORAGE_DIR: storage
      AGENT_TOOL_SANDBOX_MODE: direct
      GRAPH_NODE_EXECUTION_MODE: direct
      EXTERNAL_WEB_DISCOVERY_ENABLED: 'false'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axplanner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Run regression quality gate
        run: |
          mkdir -p outputs
          python -m app.evaluation.agent_quality_eval \
            --dataset regression \
            --strict \
            --min-status-accuracy 0.95 \
            --min-review-accuracy 0.95 \
            --min-status-macro-f1 0.95 \
            --min-review-f1 0.95 \
            --json \
            --csv outputs/agent_quality_regression.csv \
            --markdown outputs/agent_quality_regression.md
      - name: Run blind holdout quality gate
        run: |
          python -m app.evaluation.agent_quality_eval \
            --dataset holdout \
            --strict \
            --min-status-accuracy 0.85 \
            --min-review-accuracy 0.85 \
            --min-status-macro-f1 0.80 \
            --min-review-f1 0.85 \
            --json \
            --csv outputs/agent_quality_holdout.csv \
            --markdown outputs/agent_quality_holdout.md
      - name: Upload agent quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-quality-reports
          path: |
            outputs/agent_quality_regression.csv
            outputs/agent_quality_regression.md
            outputs/agent_quality_holdout.csv
            outputs/agent_quality_holdout.md
      - name: Run preflight smoke
        run: |
          python -m app.ops.preflight --json --skip-optional
