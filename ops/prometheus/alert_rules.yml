groups:
  - name: ax-planner-api
    rules:
      - alert: AXPlannerHighErrorRate
        expr: sum(rate(ax_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(ax_http_requests_total[5m])), 0.001) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AX Planner API 5xx error rate is above 5%"
          description: "Check API logs, vLLM fallback behavior, DB connectivity, and agent graph errors."

      - alert: AXPlannerHighLatency
        expr: sum(rate(ax_http_request_latency_seconds_sum[5m])) / clamp_min(sum(rate(ax_http_requests_total[5m])), 0.001) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AX Planner API average latency is above 10s"
          description: "Check graph execution, external URL fetch, embedding, and vLLM latency."

      - alert: AXPlannerAgentNodeFailure
        expr: sum(increase(ax_agent_node_runs_total{status="failed"}[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "AX Planner agent node failure detected"
          description: "Check node_worker logs and the failed node label in ax_agent_node_runs_total."

      - alert: AXPlannerSlowAgentNode
        expr: max(ax_agent_node_latency_seconds_max) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AX Planner agent node max latency is above 60s"
          description: "Check retrieval, replan URL fetch, embedding, and vLLM critic latency."
