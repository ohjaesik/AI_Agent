# Grafana dashboard provisioning 설정.
# container가 시작될 때 ops/grafana/dashboards/*.json 파일을 자동으로 읽어 dashboard를 등록한다.
apiVersion: 1

providers:
  - name: AX Delivery Planner
    orgId: 1
    folder: AX Delivery Planner
    type: file
    disableDeletion: false
    editable: true
    options:
      # docker-compose.prod.yml에서 이 host path를 Grafana dashboard 경로로 mount한다.
      path: /var/lib/grafana/dashboards
