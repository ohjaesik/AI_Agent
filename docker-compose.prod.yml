services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ax-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axplanner_password}
      POSTGRES_DB: ${POSTGRES_DB:-axplanner}
    ports:
      - "5432:5432"
    volumes:
      - ax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axplanner} -d ${POSTGRES_DB:-axplanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ax-planner-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-axplanner}:${POSTGRES_PASSWORD:-axplanner_password}@postgres:5432/${POSTGRES_DB:-axplanner}
    ports:
      - "8001:8001"
    volumes:
      - ./outputs:/app/outputs
      - ./storage:/app/storage
    command: ["python", "-m", "uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8001"]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ax-planner-prometheus
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ax_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ax-planner-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ax_grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  ax_pgdata:
  ax_prometheus_data:
  ax_grafana_data:
