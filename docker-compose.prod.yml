# AX Delivery Planner 운영형 PoC stack.
# API, PostgreSQL+pgvector, Prometheus, Grafana를 한 번에 올려 로컬 운영 검증을 수행한다.
services:
  postgres:
    # RAG vector 검색을 위해 pgvector extension이 포함된 PostgreSQL image를 사용한다.
    image: pgvector/pgvector:pg16
    container_name: ax-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axplanner_password}
      POSTGRES_DB: ${POSTGRES_DB:-axplanner}
    ports:
      - "5432:5432"
    volumes:
      - ax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axplanner} -d ${POSTGRES_DB:-axplanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # FastAPI backend. Supervisor graph, RAG 색인, 보고서 생성 endpoint가 모두 여기서 동작한다.
    build: .
    container_name: ax-planner-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # container 내부에서는 DB hostname이 localhost가 아니라 compose service 이름 `postgres`다.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-axplanner}:${POSTGRES_PASSWORD:-axplanner_password}@postgres:5432/${POSTGRES_DB:-axplanner}
    ports:
      - "8001:8001"
    volumes:
      # 생성 보고서와 업로드 원본 문서는 container 재시작 후에도 남아야 하므로 host에 mount한다.
      - ./outputs:/app/outputs
      - ./storage:/app/storage
    command: ["python", "-m", "uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8001"]

  prometheus:
    # FastAPI /metrics와 Agent 실행 metric을 수집하는 monitoring component.
    image: prom/prometheus:v2.55.1
    container_name: ax-planner-prometheus
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ax_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    # Prometheus metric을 dashboard로 시각화한다. provisioning 폴더로 datasource/dashboard를 자동 등록한다.
    image: grafana/grafana:11.4.0
    container_name: ax-planner-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ax_grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  # DB, metric, dashboard 상태를 compose down/up 사이에서도 유지하는 named volume이다.
  ax_pgdata:
  ax_prometheus_data:
  ax_grafana_data:
